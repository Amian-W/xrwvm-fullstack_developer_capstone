<!-- Contact Us Section -->
<!-- Contact Us Section -->
<div class="container my-5">
    <div class="row">
        <div class="col-md-6">
            <h2 class="mb-4">Contact Us</h2>
            <p>If you have any questions, feel free to reach out to us. We're here to help you!</p>
            <ul class="list-unstyled">
                <li><i class="fas fa-map-marker-alt me-2"></i>123 Main Street, Anytown, USA</li>
                <li><i class="fas fa-phone-alt me-2"></i>(123) 456-7890</li>
                <li><i class="fas fa-envelope me-2"></i>info@cardealership.com</li>
                <li><i class="fas fa-clock me-2"></i>Mon-Fri: 9:00 AM - 6:00 PM</li>
            </ul>
        </div>
        <div class="col-md-6">
            <form>
                <div class="mb-3">
                    <label for="name" class="form-label">Your Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your name">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email">
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">Your Message</label>
                    <textarea class="form-control" id="message" rows="4" placeholder="Write your message"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </div>
    </div>
</div>


</body>
